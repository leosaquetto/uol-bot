name: BOT LEOUOL SCRAPER

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: bot-leouol-scraper-main
  cancel-in-progress: false

jobs:
  buscar-ofertas:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: garantir branch atualizada
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: garantir arquivos json
        run: |
          if [ ! -f historico_leouol.json ]; then
            echo '{"ids":[],"dedupe_keys":[]}' > historico_leouol.json
            echo "historico_leouol.json criado"
          else
            echo "historico_leouol.json encontrado"
          fi

          if [ ! -f pending_offers.json ]; then
            echo '{"last_update":null,"offers":[]}' > pending_offers.json
            echo "pending_offers.json criado"
          else
            echo "pending_offers.json encontrado"
          fi

          if [ ! -f latest_offers.json ]; then
            echo '{"last_update":null,"offers":[]}' > latest_offers.json
            echo "latest_offers.json criado"
          else
            echo "latest_offers.json encontrado"
          fi

          if [ ! -f daily_log.json ]; then
            echo '{"date":"","message_id":null,"content":""}' > daily_log.json
            echo "daily_log.json criado"
          else
            echo "daily_log.json encontrado"
          fi

      - name: instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: rodar scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        run: python github_scraper.py

      - name: commitar mudanças
        if: always()
        run: |
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"

          [ -f historico_leouol.json ] || echo '{"ids":[],"dedupe_keys":[]}' > historico_leouol.json
          [ -f pending_offers.json ] || echo '{"last_update":null,"offers":[]}' > pending_offers.json
          [ -f latest_offers.json ] || echo '{"last_update":null,"offers":[]}' > latest_offers.json
          [ -f daily_log.json ] || echo '{"date":"","message_id":null,"content":""}' > daily_log.json

          git add historico_leouol.json pending_offers.json latest_offers.json daily_log.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "nenhuma mudança detectada"
            exit 0
          fi

          git commit -m "scraper atualiza pending e dashboard [skip ci]" || {
            echo "nada para commitar"
            exit 0
          }

          git push origin HEAD:main
          echo "alteracoes enviadas"
