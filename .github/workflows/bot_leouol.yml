name: bot leouol scraper

on:
  workflow_dispatch:
  push:
    paths:
      - snapshots/**
      - github_scraper.py
      - requirements.txt
      - requirements-consumer.txt
      - bot_leouol.py
      - status_runtime_utils.py
      - .github/workflows/bot_leouol.yml
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-leouol-scraper-main
  cancel-in-progress: false

jobs:
  buscar-ofertas:
    if: >
      github.event_name != 'push' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: garantir branch atualizada
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: garantir arquivos json
        run: |
          if [ ! -f historico_leouol.json ]; then
            echo '{"ids":[],"dedupe_keys":[],"loose_dedupe_keys":[]}' > historico_leouol.json
          fi

          if [ ! -f pending_offers.json ]; then
            echo '{"last_update":null,"offers":[]}' > pending_offers.json
          fi

          if [ ! -f latest_offers.json ]; then
            echo '{"last_update":null,"offers":[]}' > latest_offers.json
          fi

          if [ ! -f snapshots_control.json ]; then
            echo '{"processed_snapshot_ids":[]}' > snapshots_control.json
          fi

          if [ ! -f daily_log.json ]; then
            echo '{"date":"","message_id":null,"last_success_check":"","last_new_offer_at":"","pending_count":0,"last_consumer_run":"","last_rendered_text":"","lines":[]}' > daily_log.json
          fi

          if [ ! -f status_runtime.json ]; then
            echo '{"scriptable":{"last_started_at":"","last_finished_at":"","status":"","summary":"","offers_seen":0,"new_offers":0,"pending_count":0,"last_error":""},"scraper":{"last_started_at":"","last_finished_at":"","last_success_at":"","status":"","summary":"","offers_seen":0,"new_offers":0,"pending_count":0,"last_error":""},"consumer":{"last_started_at":"","last_finished_at":"","last_success_at":"","status":"","summary":"","processed":0,"sent":0,"failed":0,"pending_count":0,"last_error":""},"global":{"last_offer_title":"","last_offer_at":"","last_offer_id":""}}' > status_runtime.json
          fi

      - name: diagnóstico inicial
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone

          snapshot_path = "snapshots/mac-uol-offers.json"
          pending_path = "pending_offers.json"

          if os.path.exists(snapshot_path):
            with open(snapshot_path, "rb") as f:
              raw = f.read()
            sha = hashlib.sha256(raw).hexdigest()
            mtime = datetime.fromtimestamp(os.path.getmtime(snapshot_path), tz=timezone.utc).isoformat().replace("+00:00", "Z")
            try:
              payload = json.loads(raw.decode("utf-8"))
            except Exception:
              payload = {}
            mac_offers = len(payload.get("offers", [])) if isinstance(payload, dict) and isinstance(payload.get("offers"), list) else 0
            print(f"[diag] snapshots/mac-uol-offers.json sha256={sha} mtime_utc={mtime}")
          else:
            mac_offers = 0
            print("[diag] snapshots/mac-uol-offers.json ausente")

          try:
            with open(pending_path, "r", encoding="utf-8") as f:
              pending_payload = json.load(f)
          except Exception:
            pending_payload = {}
          pending_total = len(pending_payload.get("offers", [])) if isinstance(pending_payload, dict) and isinstance(pending_payload.get("offers"), list) else 0

          print(f"[diag] ofertas carregáveis do mac snapshot: {mac_offers}")
          print(f"[diag] total atual em pending_offers.json: {pending_total}")
          PY

      - name: instalar dependências do scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: rodar scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        run: python github_scraper.py

      - name: diagnóstico pós-scraper
        id: diag_after_scraper
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          pending_path = Path("pending_offers.json")
          runtime_path = Path("status_runtime.json")

          pending_count = 0
          pending_sha = ""
          if pending_path.exists():
            raw = pending_path.read_bytes()
            pending_sha = hashlib.sha256(raw).hexdigest()
            try:
              payload = json.loads(raw.decode("utf-8"))
            except Exception:
              payload = {}
            offers = payload.get("offers") if isinstance(payload, dict) else []
            pending_count = len(offers) if isinstance(offers, list) else 0

          new_offers = 0
          if runtime_path.exists():
            try:
              runtime = json.loads(runtime_path.read_text(encoding="utf-8"))
            except Exception:
              runtime = {}
            scraper = runtime.get("scraper") if isinstance(runtime, dict) else {}
            if isinstance(scraper, dict):
              try:
                new_offers = int(scraper.get("new_offers", 0) or 0)
              except Exception:
                new_offers = 0

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
            out.write(f"pending_count_local={pending_count}\n")
            out.write(f"pending_sha_local={pending_sha}\n")
            out.write(f"new_offers_runtime={new_offers}\n")

          print(f"[diag] pending_count_local={pending_count}")
          print(f"[diag] pending_sha_local={pending_sha or 'n/a'}")
          print(f"[diag] new_offers_runtime={new_offers}")
          PY

      - name: validar consistência scraper pending
        if: always()
        run: |
          NEW_OFFERS="${{ steps.diag_after_scraper.outputs.new_offers_runtime }}"
          PENDING_LOCAL="${{ steps.diag_after_scraper.outputs.pending_count_local }}"
          if [ "${NEW_OFFERS:-0}" -gt 0 ] && [ "${PENDING_LOCAL:-0}" -le 0 ]; then
            echo "ERRO: scraper reportou new_offers=${NEW_OFFERS}, mas pending_offers.json ficou vazio."
            exit 1
          fi

      - name: debug depois do scraper
        if: always()
        run: |
          echo "### DEBUG DEPOIS ###"
          echo "--- Status Git ---"
          git status --short
          python - <<'PY'
          import json
          from pathlib import Path

          for name in ["pending_offers.json", "status_runtime.json", "snapshots_control.json"]:
            path = Path(name)
            print(f"--- {name} ---")
            if not path.exists():
              print("arquivo ausente")
              continue
            try:
              payload = json.loads(path.read_text(encoding="utf-8"))
            except Exception as exc:
              print(f"json inválido: {exc}")
              continue
            if isinstance(payload, dict):
              offers = payload.get("offers")
              if isinstance(offers, list):
                print(f"offers_count={len(offers)}")
              processed = payload.get("processed_snapshot_ids")
              if isinstance(processed, list):
                print(f"processed_snapshot_ids_count={len(processed)}")
              for key in ["scriptable", "scraper", "consumer"]:
                value = payload.get(key)
                if isinstance(value, dict):
                  print(f"{key}_status={value.get('status')}")
                  print(f"{key}_last_success_at={value.get('last_success_at')}")
            else:
              print(type(payload).__name__)
          PY

      - name: commitar mudanças do scraper
        id: commit_scraper
        if: always()
        run: |
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"

          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name "*.pyc" -delete

          git add pending_offers.json latest_offers.json historico_leouol.json daily_log.json status_runtime.json snapshots_control.json scraper_diagnostics.json pipeline_audit.jsonl || true
          echo "arquivos staged:"
          git diff --cached --name-only || true

          if git diff --cached --quiet; then
            echo "sem mudanças para commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "pending_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --cached --name-only | grep -Fxq "pending_offers.json"; then
            echo "pending_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending_changed=false" >> "$GITHUB_OUTPUT"
          fi

          git commit -m "scraper atualiza pending e dashboard [skip ci]"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: push com retry
        if: always()
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name "*.pyc" -delete
          git fetch origin main

          if git diff --quiet origin/main..HEAD; then
            echo "nenhum commit novo"
            exit 0
          fi

          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "push concluído"
                exit 0
              fi
            else
              git rebase --abort || true
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 2
          done

      - name: processar consumer quando houver pending
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
          DASHBOARD_CHAT_ID: ${{ secrets.DASHBOARD_CHAT_ID }}
          MAX_PENDING_AGE_HOURS: "6"
          MAX_VALID_FROM_AGE_HOURS: "36"
          MAX_CONSUMER_BATCH: "8"
        run: |
          PENDING_COUNT=$(python - <<'PY'
          import json
          from pathlib import Path

          path = Path("pending_offers.json")
          if not path.exists():
            print(0)
            raise SystemExit
          try:
            data = json.loads(path.read_text(encoding="utf-8"))
          except Exception:
            print(0)
            raise SystemExit
          offers = data.get("offers") if isinstance(data, dict) else []
          print(len(offers) if isinstance(offers, list) else 0)
          PY
          )

          echo "pending_count_local_workspace=$PENDING_COUNT"

          if [ "${PENDING_COUNT:-0}" -le 0 ]; then
            echo "pending vazio, consumer não será executado"
            exit 0
          fi

          echo "pending encontrado, instalando dependências e executando consumer no mesmo workflow"
          pip install -r requirements-consumer.txt
          python bot_leouol.py --pending

      - name: commitar mudanças do consumer embutido
        if: success()
        run: |
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"

          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name "*.pyc" -delete

          git add pending_offers.json latest_offers.json historico_leouol.json daily_log.json status_runtime.json || true

          if git diff --cached --quiet; then
            echo "sem mudanças do consumer para commit"
            exit 0
          fi

          git commit -m "consumer processa pending após scraper [skip ci]"

      - name: push do consumer com retry
        if: success()
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name "*.pyc" -delete
          git fetch origin main

          if git diff --quiet origin/main..HEAD; then
            echo "nenhum commit novo do consumer"
            exit 0
          fi

          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "push do consumer concluído"
                exit 0
              fi
            else
              git rebase --abort || true
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 2
          done
