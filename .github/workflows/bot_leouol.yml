name: BOT LEOUOL SCRAPER

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: bot-leouol-scraper
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: '1'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

jobs:
  run-scraper:
    name: Buscar ofertas
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Garantir arquivos json
        shell: bash
        run: |
          if [ ! -f historico_leouol.json ]; then
            echo '{"ids":[]}' > historico_leouol.json
            echo "historico_leouol.json criado"
          else
            echo "historico_leouol.json encontrado"
          fi

          if [ ! -f pending_offers.json ]; then
            echo '{"last_update":null,"offers":[]}' > pending_offers.json
            echo "pending_offers.json criado"
          else
            echo "pending_offers.json encontrado"
          fi

      - name: Instalar dependencias
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar scraper automatico
        shell: bash
        run: |
          python github_scraper.py

      - name: Commitar historico e pending
        if: always()
        shell: bash
        run: |
          git config --global user.email "bot@leouol.com"
          git config --global user.name "BOT LEOUOL"

          [ -f historico_leouol.json ] || echo '{"ids":[]}' > historico_leouol.json
          [ -f pending_offers.json ] || echo '{"last_update":null,"offers":[]}' > pending_offers.json

          git add historico_leouol.json pending_offers.json

          if git diff --staged --quiet; then
            echo "nenhum arquivo mudou"
            exit 0
          fi

          git commit -m "scraper atualiza historico e pending [skip ci]"
          git push
          echo "alteracoes enviadas"

      - name: Upload debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-leouol-scraper-debug-${{ github.run_id }}
          path: |
            historico_leouol.json
            pending_offers.json
          if-no-files-found: ignore
          retention-days: 3
