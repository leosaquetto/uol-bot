name: BOT LEOUOL - Manual Backup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  disabled-backup:
    name: Workflow manual de backup
    runs-on: ubuntu-latest
    steps:
      - name: Aviso
        run: |
          echo "este workflow ficou apenas como backup manual."
          echo "o fluxo automático correto agora está em .github/workflows/bot_leouol_consumer.yml"          if [ ! -f historico_leouol.json ]; then
            echo '{"ids": []}' > historico_leouol.json
          fi

      - name: 📦 Instalar dependências
        shell: bash
        run: |
          pip install -r requirements.txt

      - name: 🤖 Executar BOT
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        shell: bash
        run: python bot_leouol.py

      - name: 💾 Salvar histórico
        if: always()
        shell: bash
        run: |
          git config --global user.email "bot@leouol.com"
          git config --global user.name "BOT LEOUOL"
          git add historico_leouol.json
          git diff-index --quiet HEAD || git commit -m "Atualiza histórico [skip ci]" && git push
