name: BOT LEOUOL

on:
  workflow_dispatch:

concurrency:
  group: bot-leouol
  cancel-in-progress: true

jobs:
  run-bot:
    name: Buscar Ofertas
    runs-on: [self-hosted, macOS]
    timeout-minutes: 10

    permissions:
      contents: write

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔄 Restaurar ou criar histórico
        shell: bash
        run: |
          if [ ! -f historico_leouol.json ]; then
            echo '{"ids": []}' > historico_leouol.json
            echo "✅ Arquivo de histórico criado"
          else
            echo "✅ Arquivo de histórico encontrado"
            cat historico_leouol.json
          fi

      - name: 🌐 Verificar Chrome
        shell: bash
        run: |
          if [ -d "/Applications/Google Chrome.app" ]; then
            /Applications/Google\ Chrome.app/Contents/MacOS/Google\ Chrome --version
          else
            echo "Google Chrome não encontrado no Mac"
            exit 1
          fi

      - name: 📦 Instalar dependências
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🤖 Executar BOT LEOUOL
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        shell: bash
        run: |
          python bot_leouol.py

      - name: 💾 Salvar histórico no repositório
        if: always()
        shell: bash
        run: |
          git config --global user.email "bot@leouol.com"
          git config --global user.name "BOT LEOUOL"

          if [ ! -f historico_leouol.json ]; then
            echo "❌ Arquivo de histórico não encontrado"
            exit 0
          fi

          git add historico_leouol.json

          if git diff --staged --quiet; then
            echo "📊 Histórico não mudou"
            exit 0
          fi

          git commit -m "🤖 Atualiza histórico do bot [skip ci]"
          git push
          echo "✅ Histórico salvo no repositório!"
