name: BOT LEOUOL

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: bot-leouol
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-bot:
    name: Buscar Ofertas
    runs-on: ubuntu-latest
    timeout-minutes: 6 # Aumentado levemente porque evasão exige delays maiores

    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔄 Restaurar ou criar histórico
        shell: bash
        run: |
          if [ ! -f historico_leouol.json ]; then
            echo '{"ids": []}' > historico_leouol.json
            echo "✅ Arquivo de histórico criado (vazio)"
          else
            echo "✅ Arquivo de histórico encontrado"
            cat historico_leouol.json
          fi

      - name: 🌐 Garantir Chrome e Xvfb
        shell: bash
        run: |
          # Instalando o Xvfb para rodar o Chrome fora do modo headless
          sudo apt-get update
          sudo apt-get install -y xvfb
          
          if command -v google-chrome >/dev/null 2>&1; then
            echo "✅ Chrome já disponível:"
            google-chrome --version
          else
            echo "⚠️ Chrome não encontrado. Instalando..."
            sudo apt-get install -y google-chrome-stable
            google-chrome --version
          fi

      - name: 📦 Instalar dependências
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🤖 Executar BOT LEOUOL
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        shell: bash
        run: |
          # A MÁGICA: Rode o bot DENTRO do Xvfb (Display virtual)
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python bot_leouol.py

      - name: 💾 Salvar histórico no repositório
        if: always()
        shell: bash
        run: |
          git config --global user.email "bot@leouol.com"
          git config --global user.name "BOT LEOUOL"

          if [ ! -f historico_leouol.json ]; then
            echo "❌ Arquivo de histórico não encontrado"
            exit 0
          fi

          git add historico_leouol.json

          if git diff --staged --quiet; then
            echo "📊 Histórico não mudou"
            exit 0
          fi

          git commit -m "🤖 Atualiza histórico do bot [skip ci]"
          git push
          echo "✅ Histórico salvo no repositório!"

      - name: 📎 Upload de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-leouol-debug-${{ github.run_id }}
          path: |
            debug/**/*.txt
            historico_leouol.json
          if-no-files-found: ignore
          retention-days: 3
