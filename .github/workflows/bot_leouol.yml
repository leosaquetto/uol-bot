name: bot leouol scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: bot-leouol-scraper
  cancel-in-progress: false

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: run scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        run: |
          python github_scraper.py

      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: commit changes if needed
        id: commit_step
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add .
          git commit -m "atualiza dados do scraper"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: push with rebase and retry
        if: steps.commit_step.outputs.changed == 'true'
        run: |
          branch="${GITHUB_REF_NAME:-main}"

          for attempt in 1 2 3; do
            echo "tentativa de push: $attempt"

            git fetch origin "$branch"
            git rebase "origin/$branch" || {
              git rebase --abort || true
              if [ "$attempt" -eq 3 ]; then
                echo "falha no rebase após 3 tentativas"
                exit 1
              fi
              sleep 5
              continue
            }

            if git push origin HEAD:"$branch"; then
              echo "push concluído com sucesso"
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "falha no push após 3 tentativas"
              exit 1
            fi

            sleep 5
          done
