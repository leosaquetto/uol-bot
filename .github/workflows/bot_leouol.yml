name: BOT LEOUOL

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    name: Buscar Ofertas
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}  # Importante para ter permissão de push
      
      - name: 🔄 Restaurar ou criar histórico
        run: |
          if [ ! -f historico_leouol.json ]; then
            echo '{"ids": []}' > historico_leouol.json
            echo "✅ Arquivo de histórico criado (vazio)"
          else
            echo "✅ Arquivo de histórico encontrado"
            cat historico_leouol.json
          fi
      
      - name: 🌐 Instalar Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependências
        run: |
          pip install requests selenium webdriver-manager
      
      - name: 🤖 Executar BOT LEOUOL
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_leouol.py
      
      - name: 💾 Salvar histórico no repositório
        run: |
          # Configura o git
          git config --global user.email "bot@leouol.com"
          git config --global user.name "BOT LEOUOL"
          
          # Verifica se o arquivo existe e se houve mudança
          if [ -f historico_leouol.json ]; then
            # Adiciona o arquivo (se for novo ou modificado)
            git add historico_leouol.json
            
            # Tenta commitar (só funciona se houve mudança)
            if git diff --staged --quiet; then
              echo "📊 Histórico não mudou"
            else
              git commit -m "🤖 Atualiza histórico do bot [skip ci]"
              git push
              echo "✅ Histórico salvo no repositório!"
              git show --stat
            fi
          else
            echo "❌ Arquivo de histórico não encontrado (isso é um erro)"
          fi
