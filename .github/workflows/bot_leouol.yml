name: BOT LEOUOL

on:
  schedule:
    - cron: "17 18 * * *"  # 18:17 UTC = 15:17 Brasília - Horário "quebrado"
  workflow_dispatch:

concurrency:
  group: bot-leouol
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-bot:
    name: Buscar Ofertas
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔄 Restaurar ou criar histórico
        shell: bash
        run: |
          if [ ! -f historico_leouol.json ]; then
            echo '{"ids": []}' > historico_leouol.json
            echo "✅ Arquivo de histórico criado"
          else
            echo "✅ Arquivo de histórico encontrado"
            cat historico_leouol.json
          fi

      - name: 🌐 Instalar Chrome
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: 📦 Instalar dependências
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🤖 Executar BOT LEOUOL
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: python bot_leouol.py

      - name: 💾 Salvar histórico no repositório
        if: always()
        shell: bash
        run: |
          git config --global user.email "bot@leouol.com"
          git config --global user.name "BOT LEOUOL"

          if [ ! -f historico_leouol.json ]; then
            echo "❌ Arquivo de histórico não encontrado"
            exit 0
          fi

          git add historico_leouol.json
          if git diff-index --quiet HEAD; then
            echo "Nenhuma mudança no histórico para commitar."
          else
            git commit -m "Atualiza histórico de ofertas [skip ci]"
            git push
          fi
