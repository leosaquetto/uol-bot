name: bot leouol scraper

on:
  workflow_dispatch:
  push:
    paths:
      - snapshots/**
      - github_scraper.py
      - pending_offers.json
      - scraper_diagnostics.json
      - historico_leouol.json
      - latest_offers.json
      - daily_log.json
      - status_runtime.json
      - snapshots_control.json
      - requirements.txt
      - .github/workflows/bot_leouol.yml
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: bot-leouol-scraper-main
  cancel-in-progress: false

jobs:
  buscar-ofertas:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: garantir branch atualizada
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: garantir arquivos json
        run: |
          if [ ! -f historico_leouol.json ]; then
            echo '{"ids":[],"dedupe_keys":[],"loose_dedupe_keys":[]}' > historico_leouol.json
          fi

          if [ ! -f pending_offers.json ]; then
            echo '{"last_update":null,"offers":[]}' > pending_offers.json
          fi

          if [ ! -f latest_offers.json ]; then
            echo '{"last_update":null,"offers":[]}' > latest_offers.json
          fi

          if [ ! -f snapshots_control.json ]; then
            echo '{"processed_snapshot_ids":[]}' > snapshots_control.json
          fi

          if [ ! -f daily_log.json ]; then
            echo '{"date":"","message_id":null,"last_success_check":"","last_new_offer_at":"","pending_count":0,"last_consumer_run":"","last_rendered_text":"","lines":[]}' > daily_log.json
          fi

          if [ ! -f status_runtime.json ]; then
            echo '{"scriptable":{"last_started_at":"","last_finished_at":"","status":"","summary":"","offers_seen":0,"new_offers":0,"pending_count":0,"last_error":""},"scraper":{"last_started_at":"","last_finished_at":"","last_success_at":"","status":"","summary":"","offers_seen":0,"new_offers":0,"pending_count":0,"last_error":""},"consumer":{"last_started_at":"","last_finished_at":"","last_success_at":"","status":"","summary":"","processed":0,"sent":0,"failed":0,"pending_count":0,"last_error":""},"global":{"last_offer_title":"","last_offer_at":"","last_offer_id":""}}' > status_runtime.json
          fi

      - name: diagnóstico inicial (snapshot + cargas)
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone

          snapshot_path = "snapshots/mac-uol-offers.json"
          pending_path = "pending_offers.json"

          if os.path.exists(snapshot_path):
            with open(snapshot_path, "rb") as f:
              raw = f.read()
            sha = hashlib.sha256(raw).hexdigest()
            mtime = datetime.fromtimestamp(os.path.getmtime(snapshot_path), tz=timezone.utc).isoformat().replace("+00:00", "Z")
            try:
              payload = json.loads(raw.decode("utf-8"))
            except Exception:
              payload = {}
            mac_offers = len(payload.get("offers", [])) if isinstance(payload, dict) and isinstance(payload.get("offers"), list) else 0
            print(f"[diag] snapshots/mac-uol-offers.json sha256={sha} mtime_utc={mtime}")
          else:
            mac_offers = 0
            print("[diag] snapshots/mac-uol-offers.json ausente")

          try:
            with open(pending_path, "r", encoding="utf-8") as f:
              pending_payload = json.load(f)
          except Exception:
            pending_payload = {}
          pending_total = len(pending_payload.get("offers", [])) if isinstance(pending_payload, dict) and isinstance(pending_payload.get("offers"), list) else 0

          print(f"[diag] ofertas carregáveis do mac snapshot (github_scraper.py): {mac_offers}")
          print(f"[diag] total atual de candidatas em pending_offers.json: {pending_total}")
          PY

      - name: instalar dependências do scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: debug snapshots antes do scraper
        run: |
          DEBUG_FULL_DUMP="${DEBUG_FULL_DUMP:-false}"
          MAX_ITEMS="${MAX_ITEMS:-5}"

          summarize_json() {
            local file="$1"
            local label="$2"
            local max_items="$3"

            python - "$file" "$label" "$max_items" <<'PY'
          import json
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          file_path = Path(sys.argv[1])
          label = sys.argv[2]
          max_items = int(sys.argv[3])

          if not file_path.exists():
            print(f"--- {label} ---")
            print("arquivo ausente")
            raise SystemExit

          mtime = datetime.fromtimestamp(file_path.stat().st_mtime, tz=timezone.utc).isoformat().replace("+00:00", "Z")
          print(f"--- {label} ---")
          print(f"mtime_utc={mtime}")

          try:
            payload = json.loads(file_path.read_text(encoding="utf-8"))
          except Exception as exc:
            print(f"erro ao parsear json: {exc}")
            raise SystemExit

          if isinstance(payload, dict):
            offers = payload.get("offers")
            lines = payload.get("lines")
            processed = payload.get("processed_snapshot_ids")
            print(f"keys={len(payload.keys())}")
            if isinstance(offers, list):
              print(f"offers_count={len(offers)}")
              print(f"offers_first_{max_items}={offers[:max_items]}")
            if isinstance(lines, list):
              print(f"lines_count={len(lines)}")
              print(f"lines_first_{max_items}={lines[:max_items]}")
            if isinstance(processed, list):
              print(f"processed_snapshot_ids_count={len(processed)}")
              print(f"processed_snapshot_ids_first_{max_items}={processed[:max_items]}")
          elif isinstance(payload, list):
            print(f"items_count={len(payload)}")
            print(f"items_first_{max_items}={payload[:max_items]}")
          else:
            print(f"type={type(payload).__name__}")
          PY
          }

          echo "### DEBUG ANTES ###"
          echo "HEAD atual: $(git rev-parse HEAD)"
          summarize_json "snapshots_control.json" "Resumo snapshots_control.json" "$MAX_ITEMS"
          echo "--- Arquivos em snapshots/ (máximo ${MAX_ITEMS}) ---"
          if [ -d snapshots ]; then
            TOTAL_FILES=$(find snapshots -maxdepth 2 -type f | wc -l | tr -d ' ')
            echo "total_arquivos=${TOTAL_FILES}"
            find snapshots -maxdepth 2 -type f | sort | head -n "$MAX_ITEMS"
          else
            echo "Pasta snapshots ausente"
          fi
          echo "--- Status Git ---"
          git status --short
          if [ "$DEBUG_FULL_DUMP" = "true" ]; then
            echo "--- DUMP COMPLETO snapshots_control.json (DEBUG_FULL_DUMP=true) ---"
            cat snapshots_control.json || echo "Arquivo não encontrado"
          fi

      - name: capturar pending antes do scraper
        id: pending_before
        run: |
          PENDING_BEFORE=$(python - <<'PY'
          import json
          from pathlib import Path

          path = Path("pending_offers.json")
          if not path.exists():
              print(0)
              raise SystemExit

          try:
              data = json.loads(path.read_text(encoding="utf-8"))
          except Exception:
              print(0)
              raise SystemExit

          offers = data.get("offers") if isinstance(data, dict) else []
          print(len(offers) if isinstance(offers, list) else 0)
          PY
          )
          echo "pending_count=$PENDING_BEFORE" >> "$GITHUB_OUTPUT"

      - name: rodar scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        run: python github_scraper.py

      - name: debug snapshots depois do scraper
        if: always()
        run: |
          DEBUG_FULL_DUMP="${DEBUG_FULL_DUMP:-false}"
          MAX_ITEMS="${MAX_ITEMS:-5}"

          summarize_json() {
            local file="$1"
            local label="$2"
            local max_items="$3"

            python - "$file" "$label" "$max_items" <<'PY'
          import json
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          file_path = Path(sys.argv[1])
          label = sys.argv[2]
          max_items = int(sys.argv[3])

          if not file_path.exists():
            print(f"--- {label} ---")
            print("arquivo ausente")
            raise SystemExit

          mtime = datetime.fromtimestamp(file_path.stat().st_mtime, tz=timezone.utc).isoformat().replace("+00:00", "Z")
          print(f"--- {label} ---")
          print(f"mtime_utc={mtime}")

          try:
            payload = json.loads(file_path.read_text(encoding="utf-8"))
          except Exception as exc:
            print(f"erro ao parsear json: {exc}")
            raise SystemExit

          if isinstance(payload, dict):
            offers = payload.get("offers")
            processed = payload.get("processed_snapshot_ids")
            scriptable = payload.get("scriptable")
            scraper = payload.get("scraper")
            consumer = payload.get("consumer")
            print(f"keys={len(payload.keys())}")
            if isinstance(offers, list):
              print(f"offers_count={len(offers)}")
              print(f"offers_first_{max_items}={offers[:max_items]}")
            if isinstance(processed, list):
              print(f"processed_snapshot_ids_count={len(processed)}")
              print(f"processed_snapshot_ids_first_{max_items}={processed[:max_items]}")
            if isinstance(scriptable, dict):
              print(f"scriptable_status={scriptable.get('status')}")
              print(f"scriptable_last_finished_at={scriptable.get('last_finished_at')}")
            if isinstance(scraper, dict):
              print(f"scraper_status={scraper.get('status')}")
              print(f"scraper_last_success_at={scraper.get('last_success_at')}")
            if isinstance(consumer, dict):
              print(f"consumer_status={consumer.get('status')}")
              print(f"consumer_last_success_at={consumer.get('last_success_at')}")
          elif isinstance(payload, list):
            print(f"items_count={len(payload)}")
            print(f"items_first_{max_items}={payload[:max_items]}")
          else:
            print(f"type={type(payload).__name__}")
          PY
          }

          echo "### DEBUG DEPOIS ###"
          echo "--- Status Git ---"
          git status --short
          summarize_json "pending_offers.json" "Resumo pending_offers.json" "$MAX_ITEMS"
          summarize_json "status_runtime.json" "Resumo status_runtime.json" "$MAX_ITEMS"
          summarize_json "snapshots_control.json" "Resumo snapshots_control.json" "$MAX_ITEMS"

          if [ "$DEBUG_FULL_DUMP" = "true" ] || [ "${{ job.status }}" != "success" ]; then
            echo "--- DUMP COMPLETO pending_offers.json (falha ou DEBUG_FULL_DUMP=true) ---"
            cat pending_offers.json || echo "Não gerado"
            echo "--- DUMP COMPLETO status_runtime.json (falha ou DEBUG_FULL_DUMP=true) ---"
            cat status_runtime.json || echo "Não gerado"
            echo "--- DUMP COMPLETO snapshots_control.json (falha ou DEBUG_FULL_DUMP=true) ---"
            cat snapshots_control.json || echo "Não alterado"
          fi

      - name: commitar mudanças do scraper
        id: commit_scraper
        if: always()
        run: |
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"

          git add -A

          if git diff --cached --quiet; then
            echo "sem mudanças para commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "pending_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --cached --name-only | grep -Fxq "pending_offers.json"; then
            echo "pending_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending_changed=false" >> "$GITHUB_OUTPUT"
          fi

          git commit -m "scraper atualiza pending e dashboard [skip ci]" || exit 0
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: push com retry
        if: always()
        run: |
          git fetch origin main

          if git diff --quiet origin/main..HEAD; then
            echo "nenhum commit novo"
            exit 0
          fi

          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || {
              git rebase --abort || true
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep 2
              continue
            }

            echo "HEAD local antes do push: $(git rev-parse HEAD)"
            echo "origin/main antes do push: $(git rev-parse origin/main)"

            if git push origin HEAD:main; then
              echo "push concluído"
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep 2
          done

      - name: disparar consumer quando houver pending
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE_COUNT=${{ steps.pending_before.outputs.pending_count }}
          PENDING_CHANGED_IN_COMMIT=${{ steps.commit_scraper.outputs.pending_changed }}

          PENDING_COUNT=$(python - <<'PY'
          import json
          from pathlib import Path

          path = Path("pending_offers.json")
          if not path.exists():
              print(0)
              raise SystemExit

          try:
              data = json.loads(path.read_text(encoding="utf-8"))
          except Exception:
              print(0)
              raise SystemExit

          offers = data.get("offers") if isinstance(data, dict) else []
          print(len(offers) if isinstance(offers, list) else 0)
          PY
          )

          echo "pending_before=$BEFORE_COUNT"
          echo "pending_after=$PENDING_COUNT"
          echo "pending_changed_in_commit=$PENDING_CHANGED_IN_COMMIT"

          if [ "${PENDING_COUNT:-0}" -ne "${BEFORE_COUNT:-0}" ]; then
            PENDING_CHANGED_IN_CYCLE=true
          else
            PENDING_CHANGED_IN_CYCLE=false
          fi

          if [ "${PENDING_COUNT:-0}" -gt 0 ] && { [ "$PENDING_CHANGED_IN_CYCLE" = "true" ] || [ "${PENDING_CHANGED_IN_COMMIT}" = "true" ]; }; then
            echo "disparando bot_leouol_consumer.yml via workflow_dispatch"
            if gh workflow run bot_leouol_consumer.yml --ref main; then
              echo "dispatch_path=gh"
              echo "consumer disparado via gh workflow run"
            else
              echo "dispatch_path=api_fallback"
              echo "falha no gh workflow run; tentando fallback via API REST"

              HTTP_CODE=$(curl -sS -o /tmp/workflow_dispatch_response.txt -w "%{http_code}" \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bot_leouol_consumer.yml/dispatches" \
                -d '{"ref":"main"}')

              if [ "$HTTP_CODE" = "204" ]; then
                echo "consumer disparado via API REST (workflow_dispatch)"
              else
                echo "erro: falha ao disparar consumer via gh e também via API REST (HTTP ${HTTP_CODE})"
                echo "resposta da API:"
                cat /tmp/workflow_dispatch_response.txt || true
                exit 1
              fi
            fi
          else
            echo "sem mudança efetiva de pending neste ciclo ou pending vazio; consumer não será disparado"
          fi
