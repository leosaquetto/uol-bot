name: BOT LEOUOL - Fallback (5 min)

on:
  schedule:
    - cron: "*/5 * * * *"  # ⬅️ A CADA 5 MINUTOS (mínimo do GitHub)
  workflow_dispatch:

concurrency:
  group: bot-leouol
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-bot:
    name: Buscar Ofertas (Ingressos)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔄 Restaurar histórico
        shell: bash
        run: |
          if [ ! -f historico_leouol.json ]; then
            echo '{"ids": []}' > historico_leouol.json
          fi

      - name: 🌐 Instalar Chrome
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 📦 Instalar dependências
        shell: bash
        run: |
          pip install requests selenium webdriver-manager

      - name: 🤖 Executar BOT
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        shell: bash
        run: python bot_leouol.py

      - name: 💾 Salvar histórico
        if: always()
        shell: bash
        run: |
          git config --global user.email "bot@leouol.com"
          git config --global user.name "BOT LEOUOL"
          git add historico_leouol.json
          git diff-index --quiet HEAD || git commit -m "Atualiza histórico [skip ci]" && git push
