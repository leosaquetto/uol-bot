name: BOT LEOUOL - Consumer

on:
  push:
    paths:
      - pending_offers.json
      - bot_leouol.py
      - latest_offers.json
      - historico_leouol.json
      - daily_log.json
      - status_runtime.json
      - .github/workflows/bot_leouol_consumer.yml
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-leouol-consumer-main
  cancel-in-progress: false

jobs:
  process-offers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: garantir branch atualizada
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-consumer.txt

      - name: processar pending offers
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        run: python bot_leouol.py --pending || true

      - name: commitar mudanças
        if: always()
        run: |
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"

          git add pending_offers.json latest_offers.json historico_leouol.json daily_log.json status_runtime.json || true

          if git diff --cached --quiet; then
            echo "sem mudanças para commit"
            exit 0
          fi

          git commit -m "Atualiza histórico, pending e dashboard [skip ci]" || exit 0

      - name: push com retry
        if: always()
        run: |
          if git diff --quiet HEAD~1 HEAD 2>/dev/null; then
            echo "nenhum commit novo para enviar"
            exit 0
          fi

          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || {
              git rebase --abort || true
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep 2
              continue
            }

            if git push origin HEAD:main; then
              echo "push concluído"
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep 2
          done
