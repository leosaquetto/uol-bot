# .github/workflows/bot_leouol_consumer.yml
name: BOT LEOUOL - Consumer

on:
  push:
    paths:
      - pending_offers.json
  schedule:
    - cron: "*/10 * * * *"  # A cada 10 minutos
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-offers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Process pending offers
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        run: python bot_leouol.py --pending

      - name: Commit and push changes (if any)
        if: always()
        run: |
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"
          
          # Verificar se há mudanças para commitar
          if [[ -n $(git status --porcelain) ]]; then
            git add historico_leouol.json pending_offers.json 2>/dev/null || true
            git commit -m "Atualiza histórico e pending [skip ci]" || echo "Nada para commitar"
            git push || echo "Nada para push"
          else
            echo "Nenhuma mudança detectada"
          fi
