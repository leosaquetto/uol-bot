name: BOT LEOUOL - Consumer

on:
  push:
    paths:
      - pending_offers.json
  schedule:
    - cron: "*/10 * * * *"  # A cada 10 minutos
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-offers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Process pending offers
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        run: python bot_leouol.py --pending

      - name: Cleanup
        if: always()
        run: |
          echo '{"last_update": "", "offers": []}' > pending_offers.json
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"
          git add pending_offers.json
          git diff-index --quiet HEAD || git commit -m "Cleanup [skip ci]"
          git push
