name: BOT LEOUOL - Consumer

on:
  push:
    paths:
      - pending_offers.json
      - bot_leouol.py
      - latest_offers.json
      - historico_leouol.json
      - daily_log.json
      - status_runtime.json
      - .github/workflows/bot_leouol_consumer.yml
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-leouol-consumer-main
  cancel-in-progress: false

jobs:
  process-offers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: garantir branch atualizada
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-consumer.txt

      - name: processar pending offers
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
          DASHBOARD_CHAT_ID: ${{ secrets.DASHBOARD_CHAT_ID }}
        run: |
          python bot_leouol.py --pending 2>&1 | tee consumer_process.log

      - name: diagnóstico de falha do consumer
        if: failure()
        run: |
          echo "=== status_runtime.json ==="
          if [ -f status_runtime.json ]; then
            cat status_runtime.json
          else
            echo "status_runtime.json não encontrado"
          fi

          echo "=== pending_offers.json (contagem) ==="
          if [ -f pending_offers.json ]; then
            python - <<'PY'
import json
from pathlib import Path
p = Path("pending_offers.json")
try:
    data = json.loads(p.read_text(encoding="utf-8"))
except Exception as exc:
    print(f"erro ao ler pending_offers.json: {exc}")
else:
    if isinstance(data, list):
        print(f"pending_offers_count={len(data)}")
    elif isinstance(data, dict):
        if isinstance(data.get("offers"), list):
            print(f"pending_offers_count={len(data['offers'])}")
        else:
            print(f"pending_offers_keys={list(data.keys())}")
    else:
        print(f"pending_offers_tipo={type(data).__name__}")
PY
          else
            echo "pending_offers.json não encontrado"
          fi

          echo "=== últimas linhas relevantes do log ==="
          if [ -f consumer_process.log ]; then
            grep -E "error|exception|traceback|fail|pending|consumer|telegram|status" -i consumer_process.log | tail -n 120 || true
            echo "--- tail bruto (últimas 120 linhas) ---"
            tail -n 120 consumer_process.log || true
          else
            echo "consumer_process.log não encontrado"
          fi

      - name: commitar mudanças
        if: success()
        run: |
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"

          git add pending_offers.json latest_offers.json historico_leouol.json daily_log.json status_runtime.json || true

          if git diff --cached --quiet; then
            echo "sem mudanças para commit"
            exit 0
          fi

          git commit -m "Atualiza histórico, pending e dashboard [skip ci]" || exit 0

      - name: push com retry
        if: success()
        run: |
          git fetch origin main
          if git diff --quiet origin/main..HEAD; then
            echo "nenhum commit novo para enviar"
            exit 0
          fi

          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || {
              git rebase --abort || true
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep 2
              continue
            }

            echo "HEAD local: $(git rev-parse HEAD)"
            echo "origin/main: $(git rev-parse origin/main)"

            if git push origin HEAD:main; then
              echo "push concluído"
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep 2
          done
