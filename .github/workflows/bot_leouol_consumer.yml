name: BOT LEOUOL - Consumer

on:
  push:
    paths:
      - pending_offers.json
      - bot_leouol.py
      - .github/workflows/bot_leouol_consumer.yml
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-leouol-consumer-main
  cancel-in-progress: false

jobs:
  process-offers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-consumer.txt

      - name: processar pending offers
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        run: python bot_leouol.py --pending

      - name: commitar mudanças
        if: always()
        run: |
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"
          git add .

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Atualiza histórico, pending e dashboard [skip ci]" || exit 0

          for attempt in 1 2 3; do
            git fetch origin main
            git reset --soft origin/main
            git add .

            if git diff --cached --quiet; then
              exit 0
            fi

            git commit -m "Atualiza histórico, pending e dashboard [skip ci]" || exit 0

            if git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep 2
            git reset --hard origin/main
          done
