name: BOT LEOUOL - Consumer

on:
  push:
    paths:
      - pending_offers.json
      - bot_leouol.py
      - .github/workflows/bot_leouol_consumer.yml
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-leouol-consumer-main
  cancel-in-progress: false

jobs:
  process-offers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: garantir arquivos json
        run: |
          [ -f historico_leouol.json ] || echo '{"ids":[]}' > historico_leouol.json
          [ -f pending_offers.json ] || echo '{"last_update":null,"offers":[]}' > pending_offers.json
          [ -f latest_offers.json ] || echo '{"last_update":null,"offers":[]}' > latest_offers.json

      - name: instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-consumer.txt

      - name: processar pending offers
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        run: python bot_leouol.py --pending

      - name: commitar mudanças
        if: always()
        run: |
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"

          git add historico_leouol.json pending_offers.json latest_offers.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "nenhuma mudança detectada"
            exit 0
          fi

          git commit -m "Atualiza histórico e pending [skip ci]" || {
            echo "nada para commitar"
            exit 0
          }

          git push origin HEAD:main
      - name: garantir arquivos json
        run: |
          [ -f historico_leouol.json ] || echo '{"ids":[]}' > historico_leouol.json
          [ -f pending_offers.json ] || echo '{"last_update":null,"offers":[]}' > pending_offers.json

      - name: instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-consumer.txt

      - name: processar pending offers
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GRUPO_COMENTARIO_ID: ${{ secrets.GRUPO_COMENTARIO_ID }}
        run: python bot_leouol.py --pending

      - name: commitar mudanças
        if: always()
        run: |
          git config user.email "bot@leouol.com"
          git config user.name "BOT LEOUOL"

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          git add historico_leouol.json pending_offers.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "nenhuma mudança detectada"
            exit 0
          fi

          git commit -m "Atualiza histórico e pending [skip ci]" || {
            echo "nada para commitar"
            exit 0
          }

          git push origin HEAD:main
